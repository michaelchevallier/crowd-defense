name: Build matrix (Mac/Win/Linux)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated targets (StandaloneOSX,StandaloneWindows64,StandaloneLinux64,WebGL)'
        required: false
        default: 'StandaloneOSX,StandaloneWindows64,StandaloneLinux64'

jobs:
  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            targetPlatform: StandaloneOSX
            buildMethod: CrowdDefense.Build.BuildScript.BuildOSX
            artifactName: osx-universal
          - os: ubuntu-latest
            targetPlatform: StandaloneWindows64
            buildMethod: CrowdDefense.Build.BuildScript.BuildWindows
            artifactName: windows64
          - os: ubuntu-latest
            targetPlatform: StandaloneLinux64
            buildMethod: CrowdDefense.Build.BuildScript.BuildLinux
            artifactName: linux64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Build ${{ matrix.targetPlatform }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: auto
          buildMethod: ${{ matrix.buildMethod }}
          buildName: CrowdDefense
          buildsPath: Build
          allowDirtyBuild: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrowdDefense-${{ matrix.artifactName }}
          path: Build/
          retention-days: 30
          if-no-files-found: error
